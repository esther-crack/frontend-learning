<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .buttons-container{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 95%;
            margin: 10px auto;
        }
        button{
            width: 50px;
            height: 50px;
            border-radius: 5px;
            color: black;
            background-color: white;
            border: none;
            outline: none;
            margin: 5px auto;
        }
        button:hover{
            background-color: rgb(25, 51, 196);
            color: white;
            transition: all 300ms ease-in-out;
        }
    </style>
</head>
<body>
    <div style="background-color: rgb(92, 110, 211); margin: 40px auto; width: 400px;padding: 50px 0px; border-radius: 10px;  " >
        <div style="background-color: white; width: 80%;  margin: 0px auto; height: 50px; border-radius: 5px; " >
            <input style="width: 100%; height: 100%;  background-color: transparent; border: none; outline: none;" type="text" readonly >
        </div>
        <div class="buttons-container" >
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>0</button>            
            <button>AC</button>
            <button>C</button>
            <button>%</button>
            <button>/</button>
            <button>x</button>
            <button>-</button>
            <button>+</button>
            <button>=</button>
            <button>.</button>
            <button>0</button>
        </div>
    </div>
</body>
</html>
